<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sriram Stories | Professional Studio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Oswald:wght@500&display=swap" rel="stylesheet">
</head>
<body onload="init()">

    <nav class="navbar" id="main-nav">
        <div class="logo">SRIRAM STORIES</div>
        <ul class="nav-links">
            <li><button onclick="showPage('home')">Home</button></li>
            <li><button onclick="showPage('review')">Review</button></li>
        </ul>
    </nav>

    <main id="home-page" class="page active">
        <div class="hero">
            <h1>Sriram Stories</h1>
            <p>Your cinematic universe starts here.</p>
            <button class="main-btn" onclick="showPage('studio')">Create New Story</button>
        </div>
    </main>

    <section id="review-page" class="page">
        <div class="review-container">
            <h2>Script Review Portal</h2>
            <p>Upload your story or script for analysis.</p>
            <div class="upload-area">
                <input type="file" id="review-upload" hidden onchange="handleFileUpload(this)">
                <button class="secondary-btn" onclick="document.getElementById('review-upload').click()">Upload File to Review</button>
                <p id="file-status" style="margin-top: 15px; color: #ffcc00;"></p>
            </div>
        </div>
    </section>

    <section id="studio-page" class="page studio">
        <div class="studio-header">
            <div class="toolbar">
                <button title="Bold" onclick="execCmd('bold')"><b>B</b></button>
                <button title="Italic" onclick="execCmd('italic')"><i>I</i></button>
                <button title="Heading" onclick="execCmd('formatBlock', 'h1')">H1</button>
                <button title="Attach Image" onclick="triggerImgInput()">Image</button>
                <input type="file" id="studio-img-input" hidden accept="image/*" onchange="insertImage(this)">
            </div>
            <button class="exit-btn" onclick="showPage('home')">Save & Exit</button>
        </div>
        <div class="editor-wrapper">
            <div id="editor" contenteditable="true" placeholder="Begin your script here..."></div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
